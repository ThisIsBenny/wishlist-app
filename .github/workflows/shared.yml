name: 'Shared CI Jobs'

on:
  workflow_call:
    inputs:
      run_docker:
        type: boolean
        default: false
      run_docker_publish:
        type: boolean
        default: false
      version:
        type: string
        default: ''

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Linter
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm run test:unit
      - name: API tests
        run: npm run test:api

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run test:e2e

  docker-build-and-test:
    if: inputs.run_docker && !inputs.run_docker_publish
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
      - playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker-action@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and load Docker image
        uses: docker/build-push-action@v5
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          load: true
          tags: ghcr.io/thisisbenny/wishlist-app:${{ inputs.version }}
          cache-from: type=gha

      - name: Test container runs
        run: |
          OUTPUT=$(docker run --rm ghcr.io/thisisbenny/wishlist-app:${{ inputs.version }} node -e "console.log('ok')" 2>&1) || true
          echo "Output: $OUTPUT"
          if echo "$OUTPUT" | grep -q "ok"; then
            echo "Container executes successfully"
          else
            echo "Container test failed"
            exit 1
          fi

  docker-build-and-release:
    if: inputs.run_docker_publish
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
      - playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/thisisbenny/wishlist-app:${{ inputs.version }}
            ghcr.io/thisisbenny/wishlist-app:latest
            ${{ !startsWith(inputs.version, 'v') && format('ghcr.io/thisisbenny/wishlist-app:v{0}', inputs.version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
