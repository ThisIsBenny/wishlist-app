name: 'Release'

on:
  release:
    types: [published]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Linter
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit:ci

  docker:
    runs-on: ubuntu-latest
    needs:
      - lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract version from release tag
        id: version
        run: |
          # Extract version from tag (e.g., v2.0.0-beta.1 -> 2.0.0-beta.1)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if prerelease (contains -)
          if echo "$VERSION" | grep -q '-'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

          echo "Using version: $VERSION"

      - name: Update package.json version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          node -e "
            const pkg = require('./package.json');
            const currentVersion = pkg.version;
            pkg.version = '$VERSION';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated package.json:', currentVersion, '->', '$VERSION');
          "
          git diff package.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/thisisbenny/wishlist-app:${{ steps.version.outputs.version }}
            ghcr.io/thisisbenny/wishlist-app:v${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image tags
        run: |
          echo "Built and pushed images:"
          echo "  ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
          echo "  ghcr.io/${{ github.repository }}:v${{ steps.version.outputs.version }}"
          if [ "${{ steps.version.outputs.is_prerelease }}" != "true" ]; then
            echo "  ghcr.io/${{ github.repository }}:latest"
          else
            echo "  (Skipping :latest tag - prerelease)"
          fi
